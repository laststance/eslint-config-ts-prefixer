packages:
  - 'packages/*'
  - 'website'

onlyBuiltDependencies:
  - esbuild
  - sharp
  - unrs-resolver

# Supply-chain security (migrated from .npmrc 2026-05-07)
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - next
  - react
  - react-dom
  - '@types/react'
  - '@types/react-dom'
  - typescript
  - vite
  - vitest
  - '@vitejs/plugin-react'
  - eslint
  - prettier
  - tailwindcss
  - '@tanstack/react-query'
  - zod
  - react-hook-form
  - eslint-config-ts-prefixer
  - '@laststance/redux-storage-middleware'
  - '@laststance/react-next-eslint-plugin'
verifyStoreIntegrity: true
allowBuilds:
  sharp: true
  unrs-resolver: true
peerDependencyRules:
  allowedVersions:
    eslint: '^10.0.0'
    tailwindcss: '^4.0.0'
